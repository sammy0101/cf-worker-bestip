name: Deploy Worker

on:
  push:
    branches:
      - main  # 當 main 分支有代碼推送時自動觸發
  workflow_dispatch:  # 允許在 GitHub 網頁上手動點擊執行部署

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 步驟：在部署前，將 wrangler.toml 中的佔位符替換為 GitHub Secrets 裡的值
      - name: Replace KV ID in wrangler.toml
        run: |
          sed -i 's/KV_ID_PLACEHOLDER/${{ secrets.CF_KV_ID }}/g' wrangler.toml

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # 選擇性提供：帶入 Account ID（若有多個帳戶建議設定）
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
